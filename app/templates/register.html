{% extends "base.html" %}

{% block title %}Register - Align AI Yoga{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 2rem auto;">
    <div class="card">
        <h2 style="text-align: center; margin-bottom: 2rem;">Create Account</h2>
        
        <form method="POST">
            <div>
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required autofocus>
            </div>
            
            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div>
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required minlength="6">
            </div>
            
            <div>
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="6">
            </div>
            
            <button type="submit" style="width: 100%; margin-top: 1rem;">Create Account</button>
        </form>
        
        <p style="text-align: center; margin-top: 1rem;">
            Already have an account? <a href="{{ url_for('auth.login') }}" style="color: #667eea; text-decoration: none;">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
