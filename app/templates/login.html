{% extends "base.html" %}

{% block title %}Login - Align AI Yoga{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 2rem auto;">
    <div class="card">
        <h2 style="text-align: center; margin-bottom: 2rem;">Login</h2>
        
        <form method="POST">
            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required autofocus>
            </div>
            
            <div>
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <div style="margin-top: 1rem;">
                <input type="checkbox" id="remember" name="remember" value="y">
                <label for="remember" style="display: inline; margin: 0; font-weight: normal;">Remember me</label>
            </div>
            
            <button type="submit" style="width: 100%; margin-top: 1rem;">Login</button>
        </form>
        
        <p style="text-align: center; margin-top: 1rem;">
            Don't have an account? <a href="{{ url_for('auth.register') }}" style="color: #667eea; text-decoration: none;">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
