{% extends "base.html" %}

{% block title %}Profile - Align AI Yoga{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <div class="card">
        <h2>Profile</h2>
        
        <div style="margin: 2rem 0;">
            <label>Name</label>
            <p style="font-size: 1.1rem; padding: 1rem; background: #f5f5f5; border-radius: 0.5rem;">{{ user.name }}</p>
        </div>
        
        <div style="margin: 2rem 0;">
            <label>Email</label>
            <p style="font-size: 1.1rem; padding: 1rem; background: #f5f5f5; border-radius: 0.5rem;">{{ user.email }}</p>
        </div>
        
        <div style="margin: 2rem 0;">
            <label>Member Since</label>
            <p style="font-size: 1.1rem; padding: 1rem; background: #f5f5f5; border-radius: 0.5rem;">{{ user.created_at.strftime('%B %d, %Y') }}</p>
        </div>
        
        <div style="text-align: center; margin-top: 2rem;">
            <a href="{{ url_for('dashboard.home') }}" class="btn">Back to Dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
