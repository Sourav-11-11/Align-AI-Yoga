{% extends 'index.html' %}
{% block title %}Register — Align AI Yoga{% endblock %}

{% block navbar %}
  <ul class="navbar-nav ms-auto align-items-lg-center">
    <li class="nav-item"><a class="nav-link nav-text" href="{{ url_for('auth.index') }}">Home</a></li>
    <li class="nav-sep-line"></li>
    <li class="nav-item"><a class="nav-link nav-text" href="{{ url_for('auth.login') }}">Login</a></li>
    <li class="nav-sep-line"></li>
    <li class="nav-item"><a class="nav-link nav-text nav-active" href="{{ url_for('auth.register') }}">Register</a></li>
  </ul>
{% endblock %}


{% block content %}
<div class="auth-wrap">
  <div class="auth-card" style="max-width:460px;">
    <div class="auth-card-logo">🧘</div>
    <h2 class="auth-card-title">Create Account</h2>
    <p class="auth-card-sub">Start your AI-powered yoga journey today</p>

    <form action="{{ url_for('auth.register') }}" method="post" novalidate>
      <div class="mb-3">
        <label class="form-label" for="name" style="color: #333;">Full Name</label>
        <input type="text" id="name" name="name" class="form-control"
               placeholder="Jane Doe" required minlength="3" maxlength="30"
               pattern="[A-Za-z\s]+" title="Letters and spaces only, 3–30 characters"
               autocomplete="name">
      </div>
      <div class="mb-3">
        <label class="form-label" for="email" style="color: #333;">Email Address</label>
        <input type="email" id="email" name="email" class="form-control"
               placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="mb-3">
        <label class="form-label" for="password" style="color: #333;">Password</label>
        <input type="password" id="password" name="password" class="form-control"
               placeholder="At least 8 characters" required minlength="8"
               autocomplete="new-password">
      </div>
      <div class="mb-3">
        <label class="form-label" for="c_password" style="color: #333;">Confirm Password</label>
        <input type="password" id="c_password" name="c_password" class="form-control"
               placeholder="Repeat your password" required minlength="8"
               autocomplete="new-password">
      </div>
      <button type="submit" class="btn-submit">Create Account</button>
    </form>

    <div class="auth-divider"></div>
    <p class="auth-footer">Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a></p>
  </div>
</div>
{% endblock %}
