{% extends 'index.html' %}
{% block title %}Login — Align AI Yoga{% endblock %}

{% block navbar %}
  <ul class="navbar-nav ms-auto align-items-lg-center">
    <li class="nav-item"><a class="nav-link nav-text" href="{{ url_for('auth.index') }}">Home</a></li>
    <li class="nav-sep-line"></li>
    <li class="nav-item"><a class="nav-link nav-text nav-active" href="{{ url_for('auth.login') }}">Login</a></li>
    <li class="nav-sep-line"></li>
    <li class="nav-item"><a class="nav-link nav-text" href="{{ url_for('auth.register') }}">Register</a></li>
  </ul>
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-card-logo">🧘</div>
    <h2 class="auth-card-title">Welcome back</h2>
    <p class="auth-card-sub">Sign in to your Align AI account</p>

    <form action="{{ url_for('auth.login') }}" method="post" novalidate>
      <div class="mb-3">
        <label class="form-label" for="email">Email Address</label>
        <input type="email" id="email" name="email" class="form-control"
               placeholder="you@example.com" required autofocus autocomplete="email">
      </div>
      <div class="mb-3">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" name="password" class="form-control"
               placeholder="Your password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-submit">Sign In</button>
    </form>

    <div class="auth-divider"></div>
    <p class="auth-footer">Don't have an account? <a href="{{ url_for('auth.register') }}">Create one</a></p>
  </div>
</div>
{% endblock %}
